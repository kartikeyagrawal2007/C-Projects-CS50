<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            // TODO: Add code to check answers to questions
            function checkMultiChoice(event){
                let button = event.target;
                if(button.innerHTML == "Mars"){
                     button.style.backgroundColor="green";
                     document.querySelector("#mc-feedback").innerHTML="Correct!";
                }
                else{
                    button.style.backgroundColor="red";
                    document.querySelector("#mc-feedback").innerHTML="Incorrect";
                }
            }

            function checkAnswer(){
                let input=document.querySelector("#answer");
                if(input.value.trim().toLowerCase()=="paris"){
                     input.style.backgroundColor="green";
                     document.querySelector("#fr-feedback").innerHTML="Correct!";
                }
                else{
                    input.style.backgroundColor="red";
                    document.querySelector("#fr-feedback").innerHTML="Incorrect";
                }
            }
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <h3>Which planet is known as the Red Planet?</h3>
                <!-- TODO: Add multiple choice question here -->
                <button onclick="checkMultiChoice(event)">Earth</button>
                <button onclick="checkMultiChoice(event)">Venus</button>
                <button onclick="checkMultiChoice(event)">Mars</button>
                <button onclick="checkMultiChoice(event)">Jupiter</button>

                <p id="mc-feedback"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <!-- TODO: Add free response question here -->
                 <h3>What is the capital of France?</h3>
                 <input type="text" id ="answer">
                 <button onclick="checkAnswer()">Check Answer</button>
                 <p id="fr-feedback"></p>
            </div>
        </div>
    </body>
</html>
